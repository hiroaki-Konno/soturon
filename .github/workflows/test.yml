name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: 依存パッケージをインストール
        run: uv sync --dev
      - name: isort チェック
        run: uv run isort --check-only .
      - name: ruff チェック
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: 依存パッケージをインストール
        run: uv sync --dev
      - name: Playwrightのブラウザをインストール
        run: uv run playwright install chromium --with-deps
      - name: テストを実行
        run: uv run pytest tests/test_viewer.py tests/test_edit.py -v
