<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="settings-header">
      <a href="/" class="back-link">← 戻る</a>
      <h1>設定</h1>
    </div>

    <form id="settings-form" class="settings-form">
      <div class="settings-row">
        <label for="interval-input">取得間隔（秒）</label>
        <input id="interval-input" type="number" min="1" step="1">
        <span class="settings-hint">フレームを抽出する時間間隔</span>
      </div>
      <div class="settings-row">
        <label for="threshold-input">類似度閾値</label>
        <input id="threshold-input" type="number" min="0" step="0.1">
        <span class="settings-hint">この値未満の distance は楽譜変化なしとみなしてピーク除外</span>
      </div>
      <div class="settings-actions">
        <button type="submit">保存</button>
        <span id="settings-status" class="status-msg"></span>
      </div>
    </form>
  </div>
  <script src="/static/settings.js"></script>
</body>
</html>
